# Exemplo de docker-compose para o site institucional SuperClini.
# Copie para `docker-compose.yml` na raiz do projeto na VPS antes do primeiro deploy.
# Esse arquivo é a SSoT da infra do site — toda mudança aqui deve ser refletida na VPS.
#
# Network `dentai-studio_default` é compartilhada com o app SaaS (criada pelo
# docker-compose do app dentai-studio). Se for deploy standalone, criar antes:
#   docker network create dentai-studio_default
#
# Reverse proxy (nginx) já roteia 80/443 → container `dentai-site:3000` via
# /etc/nginx/sites-enabled/superclini.

services:
  site:
    build:
      context: .
    container_name: dentai-site
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
      # Métricas de qualidade do Centro de Ayuda ("¿fue útil?"). Token para ler
      # o agregado em GET /api/help-feedback?token=... Gere um segredo:
      #   openssl rand -hex 24
      - HELP_FEEDBACK_TOKEN=CHANGE_ME
      # Série do canal de recomendação por LLM. O cron alimenta ./data/canal.jsonl
      # (scripts/canal-snapshot.mjs, 1 linha/dia). Token para ler a série em
      # GET /api/canal-stats?token=... Sem o token, a rota responde 404.
      - CANAL_STATS_TOKEN=CHANGE_ME
    volumes:
      # Persiste os votos anônimos (sem PII) em ./data/help-feedback.jsonl.
      # ⚠️ O container roda como uid 1001 (nextjs) — dar posse ao dir no host:
      #   mkdir -p data && chown 1001:65533 data
      # Sem o volume, os votos ainda vão para o stdout (docker logs dentai-site).
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/es"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: dentai-studio_default
    external: true
